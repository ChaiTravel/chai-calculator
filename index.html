<title>Merchant Charge Calculators — Chai Travel Advisors</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface-alt: #efece4;
    --border: rgba(35, 31, 32, 0.14);
    --border-strong: rgba(35, 31, 32, 0.28);
    --text: #231f20;
    --text-muted: #787878;
    --text-subtle: #9a9a9a;
    --accent: #231f20;
    --accent-hover: #000000;
    --radius-md: 6px;
    --radius-lg: 10px;
    --font: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    --font-serif: "Playfair Display", Georgia, "Times New Roman", serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 3rem 1rem;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container { max-width: 640px; width: 100%; margin: 0 auto; }

  .brand { text-align: center; margin-bottom: 2.5rem; }
  .brand img { max-width: 220px; height: auto; display: block; margin: 0 auto; }

  .title-block {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  h1 {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 500;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
    letter-spacing: 0.02em;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .choice {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.75rem 1.5rem 1.5rem;
    text-align: center;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .choice:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(35, 31, 32, 0.08);
  }
  .choice:active { transform: translateY(0); }

  .choice-flag {
    width: 64px;
    height: 42px;
    margin: 0 auto 1rem;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 0 0 0.5px rgba(35, 31, 32, 0.18);
  }
  .choice-flag svg { display: block; width: 100%; height: 100%; }

  .choice-title {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 0.35rem;
    letter-spacing: -0.01em;
  }
  .choice-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 0.75rem;
  }
  .choice-meta {
    font-size: 11px;
    color: var(--text-subtle);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-subtle);
    margin-top: 2.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  @media (max-width: 500px) {
    body { padding: 2rem 1rem; }
    .choice-grid { grid-template-columns: 1fr; }
    .brand img { max-width: 170px; }
    h1 { font-size: 22px; }
    .choice { padding: 1.5rem 1.25rem 1.25rem; }
    .choice-flag { width: 54px; height: 36px; }
  }
</style>
